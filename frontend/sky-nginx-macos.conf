worker_processes 1;

error_log logs/sky-error.log;
pid logs/sky-nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /Users/haiyanliang/Desktop/Study/JavaSpringBoot/frontend/nginx-1.28.0/conf/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10m;
    client_body_buffer_size 10m;
    client_body_temp_path /Users/haiyanliang/Desktop/Study/JavaSpringBoot/frontend/nginx-1.28.0/client_body_temp;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream sky_backend {
        server [::1]:8080;
    }

    server {
        listen 8081;
        server_name localhost;

        location / {
            root /Users/haiyanliang/Desktop/Study/JavaSpringBoot/frontend/nginx-1.20.2/html/sky;
            index index.html index.htm;
            try_files $uri $uri/ =404;
        }

        location /api/ {
            proxy_pass http://sky_backend/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /user/ {
            proxy_pass http://sky_backend/user/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ws/ {
            proxy_pass http://sky_backend/ws/;
            proxy_http_version 1.1;
            proxy_read_timeout 3600s;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
